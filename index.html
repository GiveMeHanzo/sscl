  // ============================================================
  // Icon Generation (Canvas-based)
  // ============================================================
  function generatePwaIcons() {
    // Check if icons already generated in this session
    if (sessionStorage.getItem('pwa_icons_generated')) return;

    const iconSizes = [
      { size: 152, id: 'icon-152' },
      { size: 167, id: 'icon-167' },
      { size: 180, id: 'icon-180' },
      { size: 192, id: 'icon-192' },
      { size: 512, id: 'icon-512' }
    ];

    iconSizes.forEach(({ size, id }) => {
      try {
        const canvas = document.createElement('canvas');
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');

        // Background: dark slate gradient
        const bgGrad = ctx.createLinearGradient(0, 0, size, size);
        bgGrad.addColorStop(0, '#1a1a2e');
        bgGrad.addColorStop(1, '#16213e');
        ctx.fillStyle = bgGrad;
        roundRect(ctx, 0, 0, size, size, size * 0.18);
        ctx.fill();

        // Clapperboard stripe (top diagonal area)
        const stripeGrad = ctx.createLinearGradient(0, 0, size, size * 0.35);
        stripeGrad.addColorStop(0, '#ffd54f');
        stripeGrad.addColorStop(1, '#f9ab00');
        ctx.fillStyle = stripeGrad;
        roundRect(ctx, 0, 0, size, size * 0.28, [size * 0.18, size * 0.18, 0, 0]);
        ctx.fill();

        // Horizontal divider line
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = Math.max(2, size * 0.015);
        ctx.beginPath();
        ctx.moveTo(size * 0.08, size * 0.28);
        ctx.lineTo(size * 0.92, size * 0.28);
        ctx.stroke();

        // Main character "场" (centered in lower portion)
        const fontSize = size * 0.38;
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold ' + fontSize + 'px "PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('场', size * 0.5, size * 0.58);

        // Small subtitle
        const subFontSize = size * 0.09;
        ctx.fillStyle = 'rgba(255,255,255,0.6)';
        ctx.font = subFontSize + 'px "PingFang SC","Microsoft YaHei",sans-serif';
        ctx.fillText('场记单', size * 0.5, size * 0.78);

        // Convert to blob URL and update link tags
        canvas.toBlob((blob) => {
          if (!blob) return;
          const url = URL.createObjectURL(blob);

          // Update link tags
          const links = document.querySelectorAll('link[href="icons/' + id + '.png"]');
          links.forEach(link => { link.href = url; });

          // Store in session for later use
          sessionStorage.setItem('pwa_icon_' + id, url);
        }, 'image/png');
      } catch (e) {
        console.warn('[PWA] Icon generation failed for size ' + size + ':', e);
      }
    });

    sessionStorage.setItem('pwa_icons_generated', '1');
  }

  // Helper: rounded rectangle path
  function roundRect(ctx, x, y, w, h, r) {
    if (typeof r === 'number') r = { tl: r, tr: r, br: r, bl: r };
    ctx.beginPath();
    ctx.moveTo(x + r.tl, y);
    ctx.lineTo(x + w - r.tr, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r.tr);
    ctx.lineTo(x + w, y + h - r.br);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
    ctx.lineTo(x + r.bl, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r.bl);
    ctx.lineTo(x, y + r.tl);
    ctx.quadraticCurveTo(x, y, x + r.tl, y);
    ctx.closePath();
  }

  // ============================================================
  // Service Worker Registration
  // ============================================================
  function registerServiceWorker() {
    if (!('serviceWorker' in navigator)) {
      console.log('[PWA] Service Worker not supported in this browser');
      return;
    }

    // Only register if served from http/https (not file://)
    if (location.protocol === 'file:') {
      console.log('[PWA] Service Worker requires HTTP(S), skipping (file:// protocol)');
      return;
    }

    navigator.serviceWorker.register('./sw.js', { scope: './' })
      .then((registration) => {
        console.log('[PWA] Service Worker registered:', registration.scope);

        // Check for updates
        registration.addEventListener('updatefound', () => {
          const newWorker = registration.installing;
          if (!newWorker) return;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              console.log('[PWA] New version available — refresh to update');
              // Optionally show update notification to user
            }
          });
        });
      })
      .catch((error) => {
        console.warn('[PWA] Service Worker registration failed:', error);
      });
  }

  // ============================================================
  // Dynamic Manifest Update (for generated icon blob URLs)
  // ============================================================
  function updateManifestWithIcons() {
    // Wait a bit for icon blobs to be generated
    setTimeout(() => {
      try {
        const icon192 = sessionStorage.getItem('pwa_icon_icon-192');
        const icon512 = sessionStorage.getItem('pwa_icon_icon-512');

        if (icon192 || icon512) {
          // Create a dynamic manifest with blob URLs
          const manifest = {
            name: '电子场记单',
            short_name: '场记单',
            description: '影视剧组电子场记单 — DIT 现场数据管理工具',
            start_url: './index.html',
            scope: './',
            display: 'standalone',
            orientation: 'landscape',
            background_color: '#f0f2f5',
            theme_color: '#1a1a2e',
            lang: 'zh-CN',
            icons: []
          };

          if (icon192) manifest.icons.push({ src: icon192, sizes: '192x192', type: 'image/png', purpose: 'any maskable' });
          if (icon512) manifest.icons.push({ src: icon512, sizes: '512x512', type: 'image/png', purpose: 'any maskable' });

          const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
          const manifestUrl = URL.createObjectURL(blob);
          const manifestLink = document.querySelector('link[rel="manifest"]');
          if (manifestLink) {
            manifestLink.href = manifestUrl;
          }
        }
      } catch (e) {
        console.warn('[PWA] Manifest update failed:', e);
      }
    }, 600);
  }

  // ============================================================
  // Install Button (PWA)
  // ============================================================
  let deferredPrompt = null;  // Chrome beforeinstallprompt

  function setupInstallButton() {
    const btn = document.getElementById('pwaInstallBtn');
    if (!btn) return;

    // Check if already running in standalone mode
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches ||
                         navigator.standalone ||
                         window.matchMedia('(display-mode: fullscreen)').matches ||
                         window.matchMedia('(display-mode: minimal-ui)').matches;

    if (isStandalone) {
      // Already installed — hide button permanently
      btn.style.display = 'none';
      return;
    }

    // Detect platform
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                  (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    const isSafari = /Safari/.test(navigator.userAgent) && !/Chrome|CriOS|FxiOS|OPiOS|mercury/.test(navigator.userAgent);

    // Show the button
    btn.style.display = 'inline-flex';

    if (isIOS && isSafari) {
      // iOS Safari: show guide for "Add to Home Screen"
      btn.addEventListener('click', showIOSInstallGuide);
    } else {
      // Chrome/Edge/Android: use beforeinstallprompt
      btn.addEventListener('click', triggerNativeInstall);
    }

    // Listen for Chrome's beforeinstallprompt event
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      btn.style.display = 'inline-flex';
      // Update the button to indicate native install is available
      btn.querySelector('.install-label').textContent = '安装应用';
      btn.title = '一键安装到桌面';
    });

    // Hide button if app was just installed
    window.addEventListener('appinstalled', () => {
      btn.style.display = 'none';
      deferredPrompt = null;
      console.log('[PWA] App installed successfully');
    });
  }

  function showIOSInstallGuide() {
    // Remove existing guide if any
    const existing = document.querySelector('.ios-guide-overlay');
    if (existing) existing.remove();

    const overlay = document.createElement('div');
    overlay.className = 'ios-guide-overlay';
    overlay.innerHTML =
      '<div class="ios-guide-card">' +
        '<h3>📲 添加到主屏幕</h3>' +
        '<p class="guide-subtitle">安装后可以离线使用，拥有独立应用图标</p>' +
        '<div class="ios-guide-steps">' +
          '<div class="ios-guide-step">' +
            '<span class="step-num">1</span>' +
            '<span class="step-content">点击 Safari 底部工具栏的</span>' +
            '<span class="step-icon">⎋</span>' +
          '</div>' +
          '<div class="ios-guide-step">' +
            '<span class="step-num">2</span>' +
            '<span class="step-content">在弹出菜单中向左滑动，找到</span>' +
          '</div>' +
          '<div class="ios-guide-step">' +
            '<span class="step-num">3</span>' +
            '<span class="step-content">点击 <strong>「添加到主屏幕」</strong></span>' +
            '<span class="step-icon">➕</span>' +
          '</div>' +
          '<div class="ios-guide-step">' +
            '<span class="step-num">4</span>' +
            '<span class="step-content">确认名称后点击 <strong>「添加」</strong> 即可</span>' +
            '<span class="step-icon">✅</span>' +
          '</div>' +
        '</div>' +
        '<button class="ios-guide-close">我知道了</button>' +
      '</div>';

    overlay.addEventListener('click', (e) => {
      if (e.target === overlay || e.target.classList.contains('ios-guide-close')) {
        overlay.remove();
      }
    });

    document.body.appendChild(overlay);
  }

  async function triggerNativeInstall() {
    if (deferredPrompt) {
      // Chrome/Edge native install prompt
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      console.log('[PWA] Install prompt result:', outcome);
      deferredPrompt = null;

      if (outcome === 'accepted') {
        document.getElementById('pwaInstallBtn').style.display = 'none';
      }
    } else {
      // Fallback for browsers that don't support beforeinstallprompt
      // Show a generic guide
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
      if (isIOS) {
        showIOSInstallGuide();
      } else {
        // Desktop Chrome/Edge that didn't fire beforeinstallprompt
        // Guide user to use browser menu
        showGenericInstallGuide();
      }
    }
  }

  function showGenericInstallGuide() {
    const existing = document.querySelector('.ios-guide-overlay');
    if (existing) existing.remove();

    const overlay = document.createElement('div');
    overlay.className = 'ios-guide-overlay';
    overlay.innerHTML =
      '<div class="ios-guide-card">' +
        '<h3>📲 安装此应用</h3>' +
        '<p class="guide-subtitle">安装后可离线使用，像原生应用一样</p>' +
        '<div class="ios-guide-steps">' +
          '<div class="ios-guide-step">' +
            '<span class="step-num">1</span>' +
            '<span class="step-content">点击浏览器地址栏右侧的安装图标</span>' +
            '<span class="step-icon">💻</span>' +
          '</div>' +
          '<div class="ios-guide-step">' +
            '<span class="step-num">2</span>' +
            '<span class="step-content">或在浏览器菜单中选择 <strong>「安装电子场记单」</strong></span>' +
          '</div>' +
        '</div>' +
        '<button class="ios-guide-close">我知道了</button>' +
      '</div>';

    overlay.addEventListener('click', (e) => {
      if (e.target === overlay || e.target.classList.contains('ios-guide-close')) {
        overlay.remove();
      }
    });

    document.body.appendChild(overlay);
  }

  // ============================================================
  // Initialize PWA features
  // ============================================================
  function initPWA() {
    generatePwaIcons();
    updateManifestWithIcons();
    registerServiceWorker();
    setupInstallButton();
  }

  // Run after page load
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initPWA);
  } else {
    initPWA();
  }

})();
</script>
